name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Official uv installer; matches the .python-version pin (3.12).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # Lightweight install: project deps + the `dev` group (ruff, pytest) only.
      # The heavy ML stack (torch/airllm/bitsandbytes) lives in the optional
      # `ml` extra and is intentionally NOT installed here — the quality gates
      # run against the harness logic, which mocks model I/O. --locked fails the
      # build if uv.lock is out of date.
      - name: Install workspace (uv sync)
        run: uv sync --locked

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      # Coverage threshold is config-driven: the >=85% gate lives in
      # [tool.coverage.report].fail_under in pyproject.toml, so this step carries
      # no hard-coded number that could diverge from config.
      - name: Tests + coverage (pytest, fail under 85%)
        run: uv run pytest

      # Drops in scripts/check_line_limit.py (TODO Phase 5); until then, skips.
      - name: 150-line file check
        run: |
          if [ -f scripts/check_line_limit.py ]; then
            uv run python scripts/check_line_limit.py
          else
            echo "line-limit check pending (scripts/check_line_limit.py absent)"
          fi

      # A committed scripts/secret_scan.py wires the real secret scan; until then
      # this skips (secrets come from env only, never committed — V3 S4).
      - name: Secret scan
        run: |
          if [ -f scripts/secret_scan.py ]; then
            uv run python scripts/secret_scan.py
          else
            echo "secret scan pending (scripts/secret_scan.py absent)"
          fi
